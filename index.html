<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Minimal inline CSS playground - edit directly in this document */
    .hero { min-height: 60vh; background-image: url('background-1.jpg'); background-size: cover; background-position: center; position: relative; display: flex; align-items: center; justify-content: center; color: #fff; }
    .hero::after { content: ""; position: absolute; inset: 0; background: rgba(0,0,0,0.25); }
    /* Hide overlaid content initially so only the image appears */
    .hero-content, .icon { opacity: 0; transition: opacity 240ms ease; }
    /* Optional reveal states (can be toggled later) */
    .hero.revealed .hero-content, .hero.revealed .icon { opacity: 1; }
    .hero-content { position: relative; z-index: 2; text-align: center; }
    .icon { width: 48px; height: 48px; border-radius: 50%; background: rgba(255,255,255,0.10); display: flex; align-items: center; justify-content: center; color: #fff; position: absolute; z-index: 3; font-size: 18px; }
    .icon.icon-1 { top: 12%; left: 6%; }
    .icon.icon-2 { top: 10%; right: 8%; }
    .icon.icon-3 { bottom: 10%; right: 12%; }
    #css-area { padding: 2rem; max-width: 900px; margin: 2rem auto; background: linear-gradient(0deg, rgba(255,255,255,0.03), transparent); border-radius: 8px; color: #ddd; }
    #css-area .example-box { height: 80px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.04); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: #bbb; }
  </style>
  <title>SocialAcolyte</title>
</head>
<body>
  <section class="hero" aria-label="Hero background">
    <div class="hero-content">
      <h1>SocialAcolyte</h1>
      <p>Welcome.</p>
    </div>
    <div class="icon icon-1" aria-hidden="true">★</div>
    <div class="icon icon-2" aria-hidden="true">☆</div>
    <div class="icon icon-3" aria-hidden="true">✦</div>
  </section>

  <section id="css-area" class="css-playground">
    <h2>CSS Playground</h2>
    <p>Edit styles.css to change this area.</p>
    <div class="example-box">Example box</div>
  </section>
</body>
</html>
